        @import url('https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap');
        *{
            margin:0;
            padding:0;
            font-family: "Exo 2", monospace, system-ui;
        }
        body{
            background-color: #34206c;
        }

        /* BOOT */
        #boot-screen{
            background-color: #02040a;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 99999999999999;
        }
        #boot-content{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 2rem
        }
        #boot-quasar{
            position: fixed;
            width:900px;
            height:900px;
            left:50%;
            top:50%;
            transform:translate(-50%,-50%);
            border-radius:50%;
            background:
                radial-gradient(
                    circle,
                    rgba(90,180,255,.30),
                    rgba(90,180,255,.15) 25%,
                    rgba(90,180,255,.05) 45%,
                    transparent 70%
                );
            filter:blur(80px);
            animation:breathe 10s ease-in-out infinite;
        }
        @keyframes breathe{
            0%,100%{transform: translate(-50%,-50%) scale(1);}
            50%{transform: translate(-50%,-50%) scale(1.08);}
        }
        #boot-stars{
            position:absolute;
            inset:0;
            overflow:hidden;
        }
        #boot-stars .star{
            position:absolute;
            background:white;
            border-radius:50%;
            opacity:.5;
            animation:twinkle linear infinite;
        }
        @keyframes twinkle{
            0%,100%{opacity:.15;}
            50%{opacity:.8;}
        }
        #boot-logo{
            color:#8ed8ff;
            position: relative;
            font-size: clamp(64px,10vw,120px);
            font-weight: 800;
            letter-spacing: 0.15em;
            opacity: 0;
            font-family: "Exo 2", monospace, system-ui;
            text-shadow: 0 0 15px rgba(142,216,255,.35), 0 0 40px rgba(142,216,255,.15);
            animation: logoAppear 2s ease forwards, logoPulse 7s ease-in-out infinite 2s;
        }
        @keyframes logoAppear{
            from{
                opacity:0;
                transform: translateY(20px) scale(.97);
                filter:blur(8px);
            }
            to{
                opacity:1;
                transform: translateY(0) scale(1);
                filter:blur(0);
            }
        }
        @keyframes logoPulse{
            0%,100%{text-shadow: 0 0 15px rgba(142,216,255,.35), 0 0 40px rgba(142,216,255,.15);}
            50%{text-shadow: 0 0 20px rgba(142,216,255,.5), 0 0 60px rgba(142,216,255,.2);}
        }
        #boot-subtitle{
            color: rgba(180,220,255,.75);
            letter-spacing: 0.4em;
            text-transform:uppercase;
            font-size: 0.8rem;
            opacity: 0;
            font-family: "Exo 2", monospace, system-ui;
            animation: fadeIn 2s ease 1.2s forwards;
        }
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
        #boot-launch{
            margin-top: 10px;
            padding: 16px 46px;
            border-radius: 16px;
            border: 1px solid rgba(120,220,255,.35);
            background: rgba(30,80,160,.12);
            color: #d7f4ff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .15em;
            cursor:pointer;
            font-family: "Exo 2", monospace, system-ui;
            backdrop-filter:blur(20px);
            box-shadow: 0 0 20px rgba(100,180,255,.12);
            transition: 0.15s ease;
            width: max-content;
        }
        #boot-launch:hover{
            transform:translateY(-2px);
            border-color: rgba(120,220,255,.7);
            box-shadow: 0 0 30px rgba(100,180,255,.25);
        }
        #boot-launch:active{transform:translateY(0);}

        /* OS */
        .bg-img{
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0; 
            left: 0;
            right: 0;
            bottom: 0;
            object-fit: cover;
            user-select: none;
            z-index: -10;
            pointer-events: none;
            -webkit-user-drag: none;
        }
        nav{
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);

            flex-wrap: wrap;

        .dock-btn {
            padding: 0.6rem 1.2rem;

            gap: 0.5rem;

        .dock-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 216, 255, 0.3);
        }
        .dock-btn:active {
            transform: translateY(-1px);
        }
        .window {
            width: 600px;
            height: 400px;
            min-width: 300px;
            min-height: 200px;
            top: 0;
            left: 0;
            background: rgba(20, 16, 38, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0px rgba(255, 255, 255, 0.15);
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s ease;
        }
        .window:focus-within, .window.active-focus {
            border-color: rgba(142, 216, 255, 0.4);
            box-shadow: 0 25px 60px rgba(142, 216, 255, 0.15), 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .window .bar {
            width: 100%;
            height: 2.5rem;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 0 1.25rem;
            cursor: grab !important;
            user-select: none;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .window .bar:active {
            cursor: grabbing !important;
        }
        .window .bar p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .window .bar .btns {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .window .bar .btns .btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
        }
        .window .bar .btns .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .window .bar .btns .close-btn:hover {
            background: rgba(239, 68, 68, 0.7);
        }
        .window .bar .btns .btn svg {
            width: 0.9rem;
            height: 0.9rem;
            fill: rgba(255, 255, 255, 0.8);
        }
        .window iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: transparent;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }
        .dragging iframe {
            pointer-events: none;
        }
        .window .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 75%, rgba(255, 255, 255, 0.2) 75%);
            z-index: 10;
        }
        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0;
            border: none;
            z-index: 1000 !important;
        }
        .window.maximized .resize-handle {
            display: none;
        }
    </style>

                <script>
                    function changeBg(el, url) {
                        if(el) {
                            document.querySelectorAll('.wallpaper-thumb').forEach(t => t.classList.remove('active'));
                            el.classList.add('active');
                        }
                        if(window.parent) {
                            const bgImg = window.parent.document.querySelector('.bg-img');
                            if(bgImg) bgImg.src = url;
                        }
                    }
                    function applyCustomBg() {
                        const url = document.getElementById('custom-url').value.trim();
                        if(url) {
                            changeBg(null, url);
                        }
                    }
                    function handleFileUpload(input) {
                        const file = input.files;
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                changeBg(null, e.target.result);
                                document.querySelectorAll('.wallpaper-thumb').forEach(t => t.classList.remove('active'));
                            };

    <!-- Window System -->
    <script> 
        let winId = 1;
        class QuasarWindow {
            constructor(element) {
                if (!element) return;
                
                this.win = element;
                this.bar = this.win.querySelector('.bar');
                this.handle = this.win.querySelector('.resize-handle');
                this.closeBtn = this.win.querySelector('.close-btn');
                
                // 1. Target the first button in the container for Fullscreen
                this.fullscreenBtn = this.win.querySelector('.btns .btn:first-child');

                // State tracking
                this.isDragging = false;
                this.isResizing = false;
                
                // 2. Added states to track fullscreen and remember old sizes
                this.isMaximized = false;
                this.savedStyles = { top: '', left: '', width: '', height: '' };

                this.startX = 0;
                this.startY = 0;
                this.initialLeft = 0;
                this.initialTop = 0;
                this.startWidth = 0;
                this.startHeight = 0;

                this.initEvents();
            }

            initEvents() {
                // --- DRAG EVENTS ---
                if (this.bar) {
                    this.bar.addEventListener('mousedown', (e) => {
                        if (e.target.closest('.btns')) return;
                        if (this.isMaximized) return; // 3. Prevent dragging if it's fullscreen
                        
                        this.isDragging = true;
                        this.win.classList.add('dragging');
                        this.win.style.zIndex = '100';

                        this.startX = e.clientX;
                        this.startY = e.clientY;
                        this.initialLeft = this.win.offsetLeft;
                        this.initialTop = this.win.offsetTop;

                        this.dragMoveHandler = this.dragMove.bind(this);
                        this.dragEndHandler = this.dragEnd.bind(this);

                        document.addEventListener('mousemove', this.dragMoveHandler);
                        document.addEventListener('mouseup', this.dragEndHandler);
                    });
                }

                if (this.handle) {
                this.handle.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (this.isMaximized) return;

                    this.isResizing = true;
                    // Add this line so the iframe ignores mouse movements while resizing
                    this.win.classList.add('dragging'); 

                    this.startX = e.clientX;
                    this.startY = e.clientY;
                    this.startWidth = this.win.offsetWidth;
                    this.startHeight = this.win.offsetHeight;

                    this.resizeMoveHandler = this.resizeMove.bind(this);
                    this.resizeEndHandler = this.resizeEnd.bind(this);

                    document.addEventListener('mousemove', this.resizeMoveHandler);
                    document.addEventListener('mouseup', this.resizeEndHandler);
                });
            }

                // --- FULLSCREEN / MAXIMIZE EVENT ---
                if (this.fullscreenBtn) {
                    this.fullscreenBtn.addEventListener('click', () => {
                        this.toggleFullscreen();
                    });
                }

                // --- CLOSE EVENT ---
                if (this.closeBtn) {
                    this.closeBtn.addEventListener('click', () => {
                        this.win.remove();
                    });
                }
                
                // --- FOCUS WINDOW ON CLICK ---
                this.win.addEventListener('mousedown', () => {
                    document.querySelectorAll('.window').forEach(w => w.style.zIndex = '1');
                    this.win.style.zIndex = '2';
                });
            }

            // 5. New Toggle Fullscreen Method
            toggleFullscreen() {
                if (!this.isMaximized) {
                    // Save current position and dimensions before breaking them
                    this.savedStyles.top = this.win.style.top;
                    this.savedStyles.left = this.win.style.left;
                    this.savedStyles.width = this.win.style.width;
                    this.savedStyles.height = this.win.style.height;

                    // Turn on fullscreen styling
                    this.win.classList.add('maximized');
                    this.isMaximized = true;
                } else {
                    // Revert back to the exact window dimensions it had before maximizing
                    this.win.classList.remove('maximized');
                    this.win.style.top = this.savedStyles.top;
                    this.win.style.left = this.savedStyles.left;
                    this.win.style.width = this.savedStyles.width;
                    this.win.style.height = this.savedStyles.height;
                    this.isMaximized = false;
                }
            }

            // Drag Actions
            dragMove(e) {
                if (!this.isDragging) return;
                const deltaX = e.clientX - this.startX;
                const deltaY = e.clientY - this.startY;
                this.win.style.left = `${this.initialLeft + deltaX}px`;
                this.win.style.top = `${this.initialTop + deltaY}px`;
            }

            dragEnd() {
                this.isDragging = false;
                this.win.classList.remove('dragging');
                document.removeEventListener('mousemove', this.dragMoveHandler);
                document.removeEventListener('mouseup', this.dragEndHandler);
            }

            // Resize Actions
            resizeMove(e) {
                if (!this.isResizing) return;
                const deltaX = e.clientX - this.startX;
                const deltaY = e.clientY - this.startY;
                this.win.style.width = `${this.startWidth + deltaX}px`;
                this.win.style.height = `${this.startHeight + deltaY}px`;
            }

            resizeEnd() {
                this.isResizing = false;
                this.win.classList.remove('dragging');
                document.removeEventListener('mousemove', this.resizeMoveHandler);
                document.removeEventListener('mouseup', this.resizeEndHandler);
            }
        }
